services:
  postgres:
    image: postgres:16
    container_name: whiteboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: realtime_whiteboard
    ports:
      - "5432:5432"
    volumes:
      - whiteboard_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d realtime_whiteboard"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  whiteboard_pg_data:
